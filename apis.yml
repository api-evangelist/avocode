aid: avocode
name: Avocode
description: Avocode was a design handoff platform with a REST API for managing projects,
  design files, shared screens, annotations, and design spec exports for developer-designer
  collaboration. Acquired by Ceros in October 2021 and sunset on October 1, 2023,
  Avocode supported design files from Sketch, Figma, Adobe XD, Photoshop, and Illustrator,
  enabling developers to inspect designs, extract CSS, SVG, image assets, fonts, and
  colors without requiring access to the original design tools.
